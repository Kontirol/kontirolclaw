<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ctrl · AI 助手</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 标题栏 -->
  <header id="titlebar">
    <div class="titlebar-left">
      <span class="logo">⏺ Ctrl</span>
    </div>
    <div class="titlebar-center"></div>
    <div class="titlebar-right">
      <button id="btn-lang" class="titlebar-btn" title="语言 / تىل">🌐</button>
      <button id="btn-min" class="titlebar-btn" title="最小化">─</button>
      <button id="btn-max" class="titlebar-btn" title="最大化">□</button>
      <button id="btn-close" class="titlebar-btn btn-close" title="关闭">✕</button>
    </div>

    <!-- 语言下拉 -->
    <div id="lang-menu" class="dropdown-menu hidden">
      <div class="dropdown-item" data-lang="zh">中文</div>
      <div class="dropdown-item" data-lang="ug">ئۇيغۇرچە</div>
    </div>
  </header>

  <!-- 主体 -->
  <div id="app">

    <!-- 侧边栏 -->
    <aside id="sidebar">
      <button id="btn-new-chat" class="btn-new-chat">+ <span data-i18n="newChat">新对话</span></button>
      <div id="chat-list" class="chat-list"></div>
      <div class="sidebar-footer">
        <div id="workdir-display" class="workdir-display" title="点击切换工作目录">
          <span class="workdir-icon">📁</span>
          <span id="workdir-path" class="workdir-path">...</span>
        </div>
        <span class="version">Ctrl v1.0.0</span>
      </div>
    </aside>

    <!-- 聊天区域 -->
    <main id="chat">
      <div id="messages" class="messages">
        <div class="welcome-msg">
          <div class="welcome-icon">⏺</div>
          <p data-i18n="welcome">你好，我是 Ctrl，有什么可以帮你？</p>
        </div>
      </div>

      <!-- 状态栏 -->
      <div id="statusbar" class="statusbar hidden">
        <span class="spinner"></span>
        <span id="status-text">思考中...</span>
      </div>

      <!-- 输入区 -->
      <div id="input-area">
        <textarea id="user-input" rows="1" data-i18n-placeholder="placeholder" placeholder="输入消息..."></textarea>
        <button id="btn-send" class="btn-send" title="发送">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
          </svg>
        </button>
        <button id="btn-abort" class="btn-abort hidden" title="中断">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2"/>
          </svg>
        </button>
      </div>
    </main>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
